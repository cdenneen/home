name: Merge flake.lock PR

on:
  workflow_run:
    workflows: ["flake-ci"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    # Only evaluate pull request-triggered CI runs
    if: >
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check branch scope
        id: scope
        run: |
          HEAD_REPO=$(jq -r '.workflow_run.head_repository.full_name // empty' "$GITHUB_EVENT_PATH")
          HEAD_BRANCH=$(jq -r '.workflow_run.head_branch // empty' "$GITHUB_EVENT_PATH")

          echo "head_branch=$HEAD_BRANCH" >> "$GITHUB_OUTPUT"

          if [ -n "$HEAD_REPO" ] && [ "$HEAD_REPO" = "$GITHUB_REPOSITORY" ] && [[ "$HEAD_BRANCH" == update-flake-* ]]; then
            echo "in_scope=true" >> "$GITHUB_OUTPUT"
          else
            echo "in_scope=false" >> "$GITHUB_OUTPUT"
            echo "Run repo/branch not in auto-merge scope (repo='$HEAD_REPO', branch='$HEAD_BRANCH')."
          fi

      - name: Verify required eval jobs passed
        id: evals
        if: steps.scope.outputs.in_scope == 'true'
        run: |
          RUN_ID=$(jq -r '.workflow_run.id' "$GITHUB_EVENT_PATH")
          JOB_LINES=$(gh api --paginate "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/jobs" --jq '.jobs[] | "\(.name)\t\(.conclusion)"')

          NIXOS_RESULT=$(printf '%s\n' "$JOB_LINES" | awk -F'\t' '$1=="nixos-eval"{print $2; exit}')
          DARWIN_RESULT=$(printf '%s\n' "$JOB_LINES" | awk -F'\t' '$1=="darwin-eval"{print $2; exit}')

          echo "nixos=${NIXOS_RESULT:-missing}" >> "$GITHUB_OUTPUT"
          echo "darwin=${DARWIN_RESULT:-missing}" >> "$GITHUB_OUTPUT"

          if [ "${NIXOS_RESULT:-}" = "success" ] && [ "${DARWIN_RESULT:-}" = "success" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Required eval checks not successful; PR will remain open."
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Locate flake.lock PR
        id: pr
        if: steps.scope.outputs.in_scope == 'true' && steps.evals.outputs.ready == 'true'
        run: |
          HEAD_BRANCH="${{ steps.scope.outputs.head_branch }}"

          PR=$(jq -r '.workflow_run.pull_requests[0]?.number // empty' "$GITHUB_EVENT_PATH")
          if [ -n "$PR" ]; then
            echo "pr=$PR" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "$HEAD_BRANCH" ]; then
            PR=$(gh pr list \
              --base main \
              --head "$HEAD_BRANCH" \
              --state open \
              --json number \
              --jq '.[0]?.number // empty')
          else
            PR=""
          fi
          echo "pr=$PR" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Merge flake.lock PR
        if: steps.evals.outputs.ready == 'true' && steps.pr.outputs.pr != ''
        run: gh pr merge --auto --squash "${{ steps.pr.outputs.pr }}"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
