name: "Build and populate cache"
on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "30 7 * * *"
  workflow_dispatch:
concurrency:
  group: build-populate-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write
jobs:
  Update-flake-inputs:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    concurrency:
      group: update-flake-${{ matrix.input }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        input:
          - nixpkgs
          - nixpkgs-unstable
          - home-manager
          - nix-darwin
          - opencode
          - happier
          - nixos-hardware
          - nix-index-database
          - nixos-wsl
          - nixos-crostini
          - disko
          - arion
          - sops-nix
          - nur
          - vimnix
          - nix-homebrew
          - mac-app-util
          - apple-silicon-support
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            accept-flake-config = true
      - name: Update flake input
        id: update
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail
          input="${{ matrix.input }}"
          git fetch origin main
          git checkout -B "update-flake-${input}" "origin/main"
          nix flake lock --update-input "$input"
          if git diff --exit-code flake.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add flake.lock
          git commit -m "Update flake input ${input}"
          attempts=3
          for attempt in $(seq 1 "$attempts"); do
            if git push -u "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "update-flake-${input}" --force; then
              break
            fi
            if [ "$attempt" -eq "$attempts" ]; then
              echo "Push failed after ${attempts} attempts" >&2
              exit 1
            fi
            sleep $((attempt * 2))
          done
          gh pr create \
            --base main \
            --head "update-flake-${input}" \
            --title "Update flake input ${input}" \
            --label "dependencies" \
            --label "automated" \
            --label "flake-lock" \
            --body "Updates ${input} in flake.lock." \
            || true
          echo "changed=true" >> "$GITHUB_OUTPUT"
