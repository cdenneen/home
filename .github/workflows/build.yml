name: "Build and populate cache"
on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "30 7 * * *"
  workflow_dispatch:
concurrency:
  group: build-populate-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write
jobs:
  Update-flake-inputs:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    concurrency:
      group: update-flake-${{ matrix.input }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        input:
          - nixpkgs
          - nixpkgs-unstable
          - home-manager
          - nix-darwin
          - happier
          - nixos-hardware
          - nix-index-database
          - nixos-wsl
          - nixos-crostini
          - disko
          - arion
          - sops-nix
          - nur
          - vimnix
          - nix-homebrew
          - mac-app-util
          - apple-silicon-support
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            accept-flake-config = true
      - name: Update flake input
        id: update
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail
          input="${{ matrix.input }}"
          git fetch origin main
          git checkout -B "update-flake-${input}" "origin/main"
          nix flake lock --update-input "$input"
          if git diff --exit-code flake.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add flake.lock
          git commit -m "Update flake input ${input}"
          attempts=3
          for attempt in $(seq 1 "$attempts"); do
            if git push -u "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "update-flake-${input}" --force; then
              break
            fi
            if [ "$attempt" -eq "$attempts" ]; then
              echo "Push failed after ${attempts} attempts" >&2
              exit 1
            fi
            sleep $((attempt * 2))
          done
          existing_pr=$(gh pr list \
            --base main \
            --head "update-flake-${input}" \
            --state open \
            --json number \
            --jq '.[0]?.number // empty')
          if [ -n "$existing_pr" ]; then
            echo "PR #${existing_pr} already open for update-flake-${input}"
          else
            gh pr create \
              --base main \
              --head "update-flake-${input}" \
              --title "Update flake input ${input}" \
              --label "dependencies" \
              --label "automated" \
              --body "Updates ${input} in flake.lock."
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"

  Update-agent-cli-pins:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    concurrency:
      group: update-agent-cli-${{ matrix.cli }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        cli:
          - codex
          - opencode
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            accept-flake-config = true
      - name: Update custom pinned CLI
        id: update
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail
          cli="${{ matrix.cli }}"
          git fetch origin main
          git checkout -B "update-agent-cli-${cli}" "origin/main"
          python3 ./scripts/update-agent-cli-pins.py "$cli"
          if git diff --exit-code; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add "pkgs/${cli}-cli.nix"
          git commit -m "Update ${cli} package"
          attempts=3
          for attempt in $(seq 1 "$attempts"); do
            if git push -u "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "update-agent-cli-${cli}" --force; then
              break
            fi
            if [ "$attempt" -eq "$attempts" ]; then
              echo "Push failed after ${attempts} attempts" >&2
              exit 1
            fi
            sleep $((attempt * 2))
          done
          existing_pr=$(gh pr list \
            --base main \
            --head "update-agent-cli-${cli}" \
            --state open \
            --json number \
            --jq '.[0]?.number // empty')
          if [ -n "$existing_pr" ]; then
            echo "PR #${existing_pr} already open for update-agent-cli-${cli}"
          else
            gh pr create \
              --base main \
              --head "update-agent-cli-${cli}" \
              --title "Update ${cli} package" \
              --label "dependencies" \
              --label "automated" \
              --body "Updates the custom pinned ${cli} package version and release hashes."
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"
