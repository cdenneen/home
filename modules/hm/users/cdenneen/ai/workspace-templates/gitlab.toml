profile = "ci-runner"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
default_permissions = "ci-runner"
model_reasoning_effort = "high"
model_reasoning_summary = "detailed"

developer_instructions = """
Workspace focus: GitLab CI/CD design, debugging, and delivery reliability.

Routing guidance:
- Use `gitlab-ci-expert` first for .gitlab-ci.yml design and pipeline/job triage.
- Use `terraform-expert`, `kubernetes-expert`, and `aws-expert` as domain specialists when failures cross into IaC, cluster, or cloud auth.

Pipeline style guidance:
- Keep CI config DRY using components/includes, hidden jobs, and anchors/aliases.
- Favor DAG with `needs`, targeted `rules`, and minimized artifacts/cache scope for efficiency.
- Always surface manual blockers with exact job URLs and play commands.

Execution guidance:
- Use bounded polling for non-terminal pipelines and include parent + child status.
- Tie proposed fixes directly to trace evidence.
"""
